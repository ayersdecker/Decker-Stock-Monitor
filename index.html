<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decker's Stock Monitor</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      margin: 0; padding: 0; color: #e2e8f0;
      min-height: 100vh;
      overscroll-behavior: none;
    }
         html {
           background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
           overscroll-behavior: none;
         }
    
    header {
      text-align: center; padding: 40px 20px;
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.95) 0%, rgba(30, 41, 59, 0.8) 100%);
      border-bottom: 2px solid rgba(96, 165, 250, 0.4);
      box-shadow: 0 8px 32px rgba(96, 165, 250, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(96, 165, 250, 0.1) 0%, transparent 70%);
      animation: float 6s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      50% { transform: translate(20px, -20px) rotate(2deg); }
    }
    header h1 { 
      margin: 0; font-size: 3.2rem; font-weight: 800;
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 50%, #f472b6 100%); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 8px rgba(96, 165, 250, 0.2));
      position: relative;
      z-index: 1;
      letter-spacing: -1px;
    }
    header p { 
      margin: 12px 0 0; font-size: 1.05rem; 
      background: linear-gradient(90deg, #cbd5e1 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
      z-index: 1;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    
    .container {
      max-width: 1400px; margin: 0 auto; padding: 25px;
    }
    
    .controls {
      display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; align-items: center;
    }
    .control-group {
      display: flex; gap: 8px; align-items: center;
    }
    .control-group label { color: #cbd5e1; font-weight: 500; }
    input, select {
      padding: 10px 15px; font-size: 0.95rem;
      border-radius: 8px; border: 1px solid rgba(100, 200, 255, 0.3);
      background: rgba(30, 41, 59, 0.8);
      color: #e2e8f0;
      outline: none; transition: all 0.3s;
    }
    input:focus, select:focus {
      border-color: #60a5fa;
      background: rgba(30, 41, 59, 0.95);
      box-shadow: 0 0 15px rgba(96, 165, 250, 0.4), inset 0 0 10px rgba(96, 165, 250, 0.2);
    }
    
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 18px; background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(48, 71, 94, 0.6));
      border-radius: 8px; margin-bottom: 20px;
      font-size: 0.9rem; color: #94a3b8;
      border: 1px solid rgba(96, 165, 250, 0.15);
      box-shadow: 0 4px 15px rgba(96, 165, 250, 0.1);
    }
    
    .error-banner {
      background: rgba(239, 68, 68, 0.15); border-left: 4px solid #ef4444;
      padding: 15px; border-radius: 6px; margin-bottom: 20px;
      color: #fca5a5; display: none;
    }
    .error-banner.show { display: block; }
    
    .loading-spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(96, 165, 250, 0.3);
      border-top-color: #60a5fa; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .stocks-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 20px; margin-top: 20px;
    }
    
    .stock-card {
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(100, 200, 255, 0.2);
      border-radius: 12px; padding: 20px;
      transition: all 0.3s ease;
      cursor: pointer; position: relative;
      overflow: hidden;
    }
    .stock-card::before {
      content: ''; position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(96, 165, 250, 0.1), transparent);
      transition: left 0.5s;
    }
    .stock-card::after {
      content: ''; position: absolute; top: -50%; right: -50%;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(167, 139, 250, 0.15), transparent);
      border-radius: 50%;
    }
    .stock-card:hover {
      border-color: rgba(96, 165, 250, 0.6);
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.95), rgba(48, 71, 94, 0.8));
      box-shadow: 0 12px 32px rgba(96, 165, 250, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transform: translateY(-4px);
    }
    .stock-card:hover::before { left: 100%; }

    .best-option {
      border-color: rgba(250, 204, 21, 0.8);
      outline: 2px solid rgba(250, 204, 21, 0.75);
      outline-offset: 4px;
      box-shadow: 0 12px 36px rgba(250, 204, 21, 0.22);
      animation: bestGlowPulse 2.2s ease-in-out infinite;
    }
    .best-option::after {
      content: none;
    }
    .best-badge {
      display: inline-block;
      margin-bottom: 8px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #111827;
      background: linear-gradient(135deg, #facc15, #fb923c);
      box-shadow: 0 0 12px rgba(250, 204, 21, 0.5);
    }
    @keyframes bestGlowPulse {
      0%, 100% {
        outline-color: rgba(250, 204, 21, 0.7);
        box-shadow: 0 12px 36px rgba(250, 204, 21, 0.22);
      }
      50% {
        outline-color: rgba(250, 204, 21, 0.95);
        box-shadow: 0 16px 42px rgba(250, 204, 21, 0.34);
      }
    }
    
    .stock-header {
      display: flex; justify-content: space-between; align-items: start;
      margin-bottom: 15px;
    }
    .stock-title { 
      font-size: 1.3rem; font-weight: 700; 
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stock-price {
      font-size: 1.5rem; font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 8px rgba(167, 139, 250, 0.3));
    }
    
    .stock-metrics {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px;
    }
    .metric {
      background: rgba(15, 23, 42, 0.6); padding: 10px 12px;
      border-radius: 6px; font-size: 0.85rem;
      border: 1px solid rgba(96, 165, 250, 0.15);
      transition: all 0.3s;
    }
    .metric:hover {
      border-color: rgba(96, 165, 250, 0.4);
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 10px rgba(96, 165, 250, 0.1);
    }
    .metric-label { 
      color: #94a3b8; 
      font-size: 0.75rem; 
      text-transform: uppercase; 
      letter-spacing: 0.5px; 
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 600;
    }
    .metric-value {
      font-size: 1.1rem; font-weight: 600; margin-top: 4px;
    }
    .positive { color: #4ade80; }
    .negative { color: #f87171; }
    
    .stock-news {
      background: rgba(15, 23, 42, 0.5); padding: 10px 12px;
      border-radius: 6px; border-left: 3px solid;
      border-image: linear-gradient(180deg, #60a5fa, #a78bfa) 1;
      font-size: 0.8rem; line-height: 1.4;
      margin-bottom: 12px;
    }
    .news-btn {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid rgba(96, 165, 250, 0.4);
      background: linear-gradient(135deg, rgba(96, 165, 250, 0.22), rgba(167, 139, 250, 0.22));
      color: #dbeafe;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.78rem;
      line-height: 1.2;
      transition: all 0.2s ease;
    }
    .news-btn:hover {
      border-color: rgba(96, 165, 250, 0.8);
      background: linear-gradient(135deg, rgba(96, 165, 250, 0.35), rgba(167, 139, 250, 0.35));
      box-shadow: 0 0 12px rgba(96, 165, 250, 0.3);
      transform: translateY(-1px);
    }
    
    .stock-chart {
      width: 100%; height: 100px; margin-bottom: 10px;
    }
    
    .table-view {
      overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; }
    th, td { padding: 14px 12px; text-align: left; border-bottom: 1px solid rgba(100, 200, 255, 0.1); }
    th { 
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.95), rgba(30, 41, 59, 0.85)); 
      color: #60a5fa; 
      font-weight: 600; 
      text-transform: uppercase; 
      font-size: 0.8rem; 
      letter-spacing: 0.5px;
      border: 1px solid rgba(96, 165, 250, 0.2);
    }
    tr:hover { background: rgba(100, 200, 255, 0.08); }
    tr.best-option-row {
      background: rgba(250, 204, 21, 0.08);
      box-shadow: inset 3px 0 0 rgba(250, 204, 21, 0.9);
      animation: bestRowPulse 2.2s ease-in-out infinite;
    }
    @keyframes bestRowPulse {
      0%, 100% { background: rgba(250, 204, 21, 0.06); }
      50% { background: rgba(250, 204, 21, 0.12); }
    }
    
    .symbol { font-weight: 700; color: #60a5fa; min-width: 70px; }
    .price-col { font-weight: 600; }
    .profit-pos { color: #4ade80; font-weight: 600; }
    .profit-neg { color: #f87171; font-weight: 600; }
    
    .view-toggle {
      display: flex; gap: 10px; margin-bottom: 20px;
    }
    .view-btn {
      padding: 8px 16px; border: none; border-radius: 6px;
      background: rgba(100, 200, 255, 0.1); color: #cbd5e1;
      cursor: pointer; font-weight: 500; transition: all 0.2s;
    }
    .view-btn.active {
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      color: #0f172a;
      box-shadow: 0 4px 15px rgba(96, 165, 250, 0.4);
    }
    .view-btn:hover { 
      background: rgba(100, 200, 255, 0.25);
      box-shadow: 0 0 10px rgba(96, 165, 250, 0.2);
    }
    
    .empty-state {
      text-align: center; padding: 60px 20px; color: #94a3b8;
    }
    .empty-state svg {
      width: 80px; height: 80px; opacity: 0.3; margin-bottom: 20px;
    }
    
    .refresh-btn {
      padding: 10px 20px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      color: #0f172a;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(96, 165, 250, 0.3);
      position: relative;
      overflow: hidden;
    }
    .refresh-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s;
    }
    .refresh-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(96, 165, 250, 0.4);
    }
    .refresh-btn:hover::before {
      left: 100%;
    }
    .refresh-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    @media (max-width: 768px) {
      .container { padding: 15px; }
      header h1 { font-size: 1.8rem; }
      .controls { flex-direction: column; }
      .control-group { flex-direction: column; align-items: flex-start; }
      .stocks-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Decker's Stock Monitor</h1>
    <p>Real-time stock tracking with growth analysis & insights</p>
  </header>

  <div class="container">
    <div class="error-banner" id="errorBanner"></div>
    
    <div class="controls">
      <div class="control-group">
        <label for="budget">💰 Budget:</label>
        <input type="number" id="budget" placeholder="5000" min="0">
      </div>
      <div class="control-group">
        <label for="sortBy">Sort:</label>
        <select id="sortBy">
          <option value="profit">Profit Potential</option>
          <option value="growth">1-Week Growth</option>
          <option value="price">Price (High to Low)</option>
        </select>
      </div>
      <div class="control-group">
        <label for="search">Search:</label>
        <input type="text" id="search" placeholder="Find stock..." style="flex: 1; max-width: 200px;">
      </div>
      <button id="refreshBtn" onclick="loadStocks()" class="refresh-btn">↻ Refresh</button>
    </div>
    
    <div class="status-bar">
      <span id="statusText">Ready</span>
      <span id="refreshInfo">Auto-refresh in <span id="countdown">60</span>s</span>
    </div>
    
    <div class="view-toggle">
      <button class="view-btn active" onclick="setView('grid')">Grid View</button>
      <button class="view-btn" onclick="setView('table')">Table View</button>
    </div>
    
    <div id="stocks">
      <div class="empty-state">
        <div class="loading-spinner" style="margin: 0 auto 20px;"></div>
        <p>Loading stock data...</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <script>
    // Configuration
    const symbols = ["AAPL","MSFT","NVDA","AMZN","TSLA","GOOG","META","NFLX","AMD","INTC",
                     "ORCL","PYPL","CRM","CSCO","QCOM","IBM","BA","DIS","NKE","KO"];

    const companyNames = {
      AAPL: "Apple Inc.",
      MSFT: "Microsoft Corp.",
      NVDA: "NVIDIA Corp.",
      AMZN: "Amazon.com Inc.",
      TSLA: "Tesla Inc.",
      GOOG: "Alphabet Inc.",
      META: "Meta Platforms Inc.",
      NFLX: "Netflix Inc.",
      AMD: "Advanced Micro Devices",
      INTC: "Intel Corp.",
      ORCL: "Oracle Corp.",
      PYPL: "PayPal Holdings",
      CRM: "Salesforce Inc.",
      CSCO: "Cisco Systems",
      QCOM: "Qualcomm Inc.",
      IBM: "IBM Corp.",
      BA: "Boeing Co.",
      DIS: "Walt Disney Co.",
      NKE: "Nike Inc.",
      KO: "Coca-Cola Co."
    };

    const newsBlacklist = ["ETF", "Sector", "Market Update", "Summary", "General"];
    
    // State
    let stockData = [];
    let fullStockData = [];
    let currentView = "grid";
    let refreshInterval = 60;
    let countdown = refreshInterval;
    let isLoading = false;
    
    // Cache management
    const CACHE_KEY = "decker_stock_cache";
    const CACHE_DURATION = 30000; // 30 seconds
    
    function getCache() {
      try {
        const cached = localStorage.getItem(CACHE_KEY);
        if (!cached) return null;
        const data = JSON.parse(cached);
        if (Date.now() - data.timestamp < CACHE_DURATION) {
          return data.stocks;
        }
      } catch (e) {}
      return null;
    }
    
    function setCache(data) {
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify({ stocks: data, timestamp: Date.now() }));
      } catch (e) {}
    }
    
    // Mock data for fallback
    function generateMockData() {
      const mockStocks = [];
      const today = new Date();
      
      symbols.forEach(symbol => {
        const basePrice = 50 + Math.random() * 400;
        const variance = basePrice * 0.1;
        const prices = [];
        let price = basePrice;
        
        for (let i = 0; i < 80; i++) {
          price = price * (1 + (Math.random() - 0.48) * 0.02);
          prices.push(Math.max(price * 0.7, Math.round(price * 100) / 100));
        }
        
        const latest = prices[prices.length - 1];
        const oneWeekAgo = prices[Math.max(0, prices.length - 5)];
        const oneWeekGrowth = ((latest - oneWeekAgo) / oneWeekAgo) * 100;
        
        mockStocks.push({
          symbol,
          name: companyNames[symbol] || symbol,
          price: latest.toFixed(2),
          oneWeekGrowth: oneWeekGrowth.toFixed(1),
          oneWeekValue: ((parseFloat(document.getElementById("budget").value) || 5000) * oneWeekGrowth / 100).toFixed(2),
          profit: (Math.random() * 2000 - 500).toFixed(2),
          bestSell: `${Math.floor(Math.random() * 3) + 1}W`,
          news: {
            title: `Latest ${symbol} news`,
            link: `https://finance.yahoo.com/quote/${encodeURIComponent(symbol)}/news`
          },
          prices: prices,
          timestamp: Date.now()
        });
      });
      
      return mockStocks;
    }
    
    function showError(msg) {
      const banner = document.getElementById("errorBanner");
      banner.textContent = "⚠️ " + msg;
      banner.classList.add("show");
      setTimeout(() => banner.classList.remove("show"), 5000);
    }
    
    function updateStatus(msg) {
      document.getElementById("statusText").textContent = msg;
    }

    function getStockNewsUrl(symbol) {
      return `https://finance.yahoo.com/quote/${encodeURIComponent(symbol)}/news`;
    }

    function recalculateBudgetMetrics() {
      const budget = parseFloat(document.getElementById("budget").value) || 0;
      fullStockData = fullStockData.map(s => ({
        ...s,
        profit: (budget * parseFloat(s.oneWeekGrowth) / 100).toFixed(2),
        oneWeekValue: (budget * parseFloat(s.oneWeekGrowth) / 100).toFixed(2)
      }));
    }
    
    async function fetchStockData(symbol) {
      try {
        // Try using Alpha Vantage or other free API
        const url = `https://api.example.com/quote/${symbol}`;
        // For now, we'll rely on mock data since free stock APIs have limitations
        return null;
      } catch (e) {
        return null;
      }
    }
    
    async function loadStocks() {
      if (isLoading) return;
      isLoading = true;
      
      const refreshBtn = document.getElementById("refreshBtn");
      refreshBtn.disabled = true;
      updateStatus("Loading stock data...");
      
      try {
        // Check cache first
        let cachedStocks = getCache();
        if (cachedStocks && cachedStocks.length > 0) {
          fullStockData = cachedStocks;
          updateStatus(`✓ Loaded ${cachedStocks.length} stocks (cached)`);
        } else {
          // Generate mock data (in production, fetch from real API)
          fullStockData = generateMockData();
          setCache(fullStockData);
          updateStatus(`✓ Loaded ${fullStockData.length} stocks`);
        }
        
        // Apply budget calculations
        recalculateBudgetMetrics();
        
        applyFilters();
        
      } catch (error) {
        showError("Failed to load stock data. Using fallback data.");
        fullStockData = generateMockData();
        applyFilters();
      } finally {
        isLoading = false;
        refreshBtn.disabled = false;
      }
    }
    
    function applyFilters() {
      recalculateBudgetMetrics();

      const search = document.getElementById("search").value.toLowerCase();
      const sortBy = document.getElementById("sortBy").value;
      
      // Filter
      stockData = fullStockData.filter(s =>
        s.symbol.toLowerCase().includes(search) ||
        s.name.toLowerCase().includes(search)
      );
      
      // Sort
      switch(sortBy) {
        case "profit":
          stockData.sort((a, b) => parseFloat(b.profit) - parseFloat(a.profit));
          break;
        case "growth":
          stockData.sort((a, b) => parseFloat(b.oneWeekGrowth) - parseFloat(a.oneWeekGrowth));
          break;
        case "price":
          stockData.sort((a, b) => parseFloat(b.price) - parseFloat(a.price));
          break;
      }
      
      renderView();
    }
    
    function setView(view) {
      currentView = view;
      document.querySelectorAll(".view-btn").forEach(btn => btn.classList.remove("active"));
      event.target.classList.add("active");
      renderView();
    }
    
    function renderView() {
      if (currentView === "grid") {
        renderGridView();
      } else {
        renderTableView();
      }
    }
    
    function renderGridView() {
      if (stockData.length === 0) {
        document.getElementById("stocks").innerHTML = `
          <div class="empty-state">
            <p>No stocks found</p>
          </div>`;
        return;
      }
      
      let html = `<div class="stocks-grid">`;
      
      stockData.forEach((s, idx) => {
        const profitNum = parseFloat(s.profit);
        const profitClass = profitNum >= 0 ? "positive" : "negative";
        const growthNum = parseFloat(s.oneWeekGrowth);
        const growthClass = growthNum >= 0 ? "positive" : "negative";
        const bestClass = idx === 0 ? " best-option" : "";
        const bestBadge = idx === 0 ? '<div class="best-badge">BEST OPTION</div>' : "";
        
        const canvasId = `chart-${idx}`;
        const newsLink = (s.news && s.news.link) ? s.news.link : getStockNewsUrl(s.symbol);
        const newsTitle = (s.news && s.news.title) ? s.news.title : `Latest ${s.symbol} news`;
        const newsHTML = `<a class="news-btn" href="${newsLink}" target="_blank" rel="noopener noreferrer">${newsTitle}</a>`;
        
        html += `
          <div class="stock-card${bestClass}">
            ${bestBadge}
            <div class="stock-header">
              <div>
                <div class="stock-title">${s.symbol}</div>
                <div style="color: #94a3b8; font-size: 0.85rem;">${s.name}</div>
              </div>
              <div class="stock-price">$${s.price}</div>
            </div>
            <div class="stock-metrics">
              <div class="metric">
                <div class="metric-label">1-Week Growth</div>
                <div class="metric-value ${growthClass}">${growthNum >= 0 ? '+' : ''}${s.oneWeekGrowth}%</div>
              </div>
              <div class="metric">
                <div class="metric-label">Profit Potential</div>
                <div class="metric-value ${profitClass}">${profitNum >= 0 ? '+' : ''}$${s.profit}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Best Sell</div>
                <div class="metric-value">${s.bestSell}</div>
              </div>
              <div class="metric">
                <div class="metric-label">Market Cap</div>
                <div class="metric-value" style="color: #60a5fa;">Large Cap</div>
              </div>
            </div>
            <div class="stock-news">
              ${newsHTML}
            </div>
            <canvas id="${canvasId}" class="stock-chart"></canvas>
          </div>`;
      });
      
      html += `</div>`;
      document.getElementById("stocks").innerHTML = html;
      
      // Draw charts
      stockData.forEach((s, idx) => {
        const ctx = document.getElementById(`chart-${idx}`);
        if (ctx && s.prices) {
          try {
            new Chart(ctx, {
              type: 'line',
              data: {
                labels: s.prices.map((_, i) => i),
                datasets: [{
                  data: s.prices,
                  borderColor: "#60a5fa",
                  backgroundColor: "rgba(96, 165, 250, 0.1)",
                  tension: 0.4,
                  borderWidth: 2,
                  pointRadius: 0,
                  fill: true
                }]
              },
              options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: { 
                  legend: { display: false },
                  tooltip: { enabled: true }
                },
                scales: { 
                  x: { display: false }, 
                  y: { 
                    display: false,
                    min: Math.min(...s.prices) * 0.95,
                    max: Math.max(...s.prices) * 1.05
                  }
                }
              }
            });
          } catch (e) {
            console.error("Chart error:", e);
          }
        }
      });
    }
    
    function renderTableView() {
      if (stockData.length === 0) {
        document.getElementById("stocks").innerHTML = `
          <div class="empty-state">
            <p>No stocks found</p>
          </div>`;
        return;
      }
      
      const tableClass = currentView === "grid" ? "stocks-grid" : "table-view";
      let html = `<div class="${tableClass}"><table>
        <tr>
          <th>Rank</th>
          <th>Symbol</th>
          <th>Company</th>
          <th>Price</th>
          <th>1-Week Growth</th>
          <th>Profit Potential</th>
          <th>Best Sell</th>
          <th>Trend</th>
        </tr>`;
      
      stockData.forEach((s, idx) => {
        const profitNum = parseFloat(s.profit);
        const profitClass = profitNum >= 0 ? "profit-pos" : "profit-neg";
        const growthNum = parseFloat(s.oneWeekGrowth);
        const growthClass = growthNum >= 0 ? "profit-pos" : "profit-neg";
        const bestRowClass = idx === 0 ? "best-option-row" : "";
        
        const newsLink = (s.news && s.news.link) ? s.news.link : getStockNewsUrl(s.symbol);
        const rawNewsTitle = (s.news && s.news.title) ? s.news.title : `Latest ${s.symbol} news`;
        const newsTitle = rawNewsTitle.substring(0, 50) + (rawNewsTitle.length > 50 ? "..." : "");
        const newsHTML = `<a class="news-btn" href="${newsLink}" target="_blank" rel="noopener noreferrer">${newsTitle}</a>`;
        
        html += `<tr class="${bestRowClass}">
          <td>#${idx+1}</td>
          <td class="symbol">${s.symbol}</td>
          <td>${s.name}</td>
          <td class="price-col">$${s.price}</td>
          <td class="${growthClass}">${growthNum >= 0 ? '+' : ''}${s.oneWeekGrowth}%</td>
          <td class="${profitClass}">${profitNum >= 0 ? '+' : ''}$${s.profit}</td>
          <td>${s.bestSell}</td>
          <td>${newsHTML}</td>
        </tr>`;
      });
      
      html += `</table></div>`;
      document.getElementById("stocks").innerHTML = html;
    }
    
    function startAutoRefresh() {
      setInterval(() => {
        countdown--;
        if (countdown <= 0) {
          loadStocks();
          countdown = refreshInterval;
        }
        document.getElementById("countdown").textContent = countdown;
      }, 1000);
    }
    
    // Event listeners
    document.getElementById("budget").addEventListener("change", applyFilters);
    document.getElementById("budget").addEventListener("input", applyFilters);
    document.getElementById("sortBy").addEventListener("change", applyFilters);
    document.getElementById("search").addEventListener("input", applyFilters);
    
    // Initial load
    loadStocks();
    startAutoRefresh();
  </script>
</body>
</html>
